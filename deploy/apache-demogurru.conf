# Vhost para demogurru.unlimited-systems.net
# Sirve estático Vite desde /var/www/demogurru/web y proxy /api a 127.0.0.1:3100
# El bloque :443 lo añade certbot tras emitir el cert (genera demogurru-le-ssl.conf)

<VirtualHost *:80>
    ServerName demogurru.unlimited-systems.net

    DocumentRoot /var/www/demogurru/web

    RewriteEngine On

    # ACME HTTP-01 (certbot)
    Alias /.well-known/acme-challenge/ /var/www/demogurru/acme/.well-known/acme-challenge/
    <Directory /var/www/demogurru/acme/.well-known/acme-challenge/>
        Require all granted
    </Directory>

    <Directory /var/www/demogurru/web>
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None

        # SPA fallback — todo lo que no es archivo real va a index.html
        RewriteEngine On
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/\.well-known/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    # Cache largo para assets con hash, sin cache para index.html
    <FilesMatch "\.(js|css|png|jpg|jpeg|webp|svg|woff2?|ttf|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "^index\.html$">
        Header set Cache-Control "public, max-age=0, must-revalidate"
    </FilesMatch>

    # Proxy al backend Node
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /.well-known/acme-challenge/ !
    ProxyPass /api/ http://127.0.0.1:3100/api/
    ProxyPassReverse /api/ http://127.0.0.1:3100/api/
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}e"

    # Bloquear paths típicos de scanners
    <LocationMatch "^/(\.env|\.git|wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin)">
        Require all denied
    </LocationMatch>

    ErrorLog ${APACHE_LOG_DIR}/demogurru-error.log
    CustomLog ${APACHE_LOG_DIR}/demogurru-access.log combined

    # Redirect a HTTPS (lo añade certbot, replicado aquí para que sobreviva re-deploys)
    RewriteCond %{HTTPS} !=on
    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
